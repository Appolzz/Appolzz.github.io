    <!--
Part A:
1. CSS Grid: a two-dimensional layout system (rows + columns). Flexbox is one-dimensional (single axis: row or column).
2. grid-template-columns / grid-template-rows: define column/row tracks. Example: grid-template-columns: 1fr 2fr 1fr; grid-template-rows: auto 200px;
3. fr units: fractional parts of remaining space. 1fr 2fr 1fr gives proportions 1:2:1 and adapts to gaps; 33%/34%/33% are fixed percentages.
4. Three responsive columns: grid-template-columns: repeat(3, minmax(150px, 1fr));
5. auto-fit with minmax(): use to let columns wrap and collapse empty tracks; it fits as many columns as space allows.
6. Span all columns (line-based): grid-column: 1 / -1;
7. Grid template areas: name layout regions and place items by area; improves readability and makes rearranging easier.

Part C:
Grid made the 2D gallery simpler than a flex only approach because I could control 
both rows and columns. gap and fr were most useful for consistent spacing and proportional 
sizing, and minmax kept cards readable on small screens. Template areas are helpful for 
complex layouts, but not needed for this simple gallery. I made sure there was accessibility with 
focusable links, visible focus outlines, readable font sizes, and good caption contrast. 
Using auto-fit and minmax allowed the gallery to remain legible on smaller screens.
-->

  <main class="site-main wrap">
    <div class="cards">
      <figure class="card">
